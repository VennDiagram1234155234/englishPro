    <style>
        :root { 
            --bg: #0a0a0a; 
            --card-bg: #1a1a1a; 
            --accent: #64ffda; 
            --text-main: #e0e0e0; 
            --text-dim: #666;
            --dashed: #333;
        }
        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg); color: var(--text-main);
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            height: 100vh; margin: 0; overflow: hidden;
        }
        .level-selector {
            position: absolute; top: 30px; display: grid; 
            grid-template-columns: repeat(6, 1fr); gap: 8px; z-index: 100;
            background: #111; padding: 10px; border-radius: 12px; border: 1px solid #222;
        }
        .level-btn {
            background: #1a1a1a; border: 1px solid #333; color: var(--text-dim);
            padding: 8px 14px; border-radius: 8px; cursor: pointer; transition: 0.3s; 
            font-weight: 800; font-size: 0.8rem;
        }
        .level-btn.active { color: #000; background: var(--accent); border-color: var(--accent); }
        .drop-zone {
            position: absolute; display: flex; align-items: center; justify-content: center;
            font-weight: 900; font-size: 1.2rem; color: #444;
            text-transform: uppercase; pointer-events: none; transition: 0.3s; z-index: 1;
            letter-spacing: 4px;
        }
        .zone-top { 
            top: 0; left: 0; right: 0; height: 120px; 
            border-bottom: 2px dashed var(--dashed);
            align-items: flex-end; padding-bottom: 20px;
        }
        .zone-left { 
            left: 0; top: 0; bottom: 0; width: 120px; 
            writing-mode: vertical-rl; transform: rotate(180deg);
            border-right: 2px dashed var(--dashed);
            padding-left: 20px;
        }
        .zone-right { 
            right: 0; top: 0; bottom: 0; width: 120px; 
            writing-mode: vertical-rl;
            border-left: 2px dashed var(--dashed);
            padding-left: 20px;
        }
        .active-learned { color: #2ecc71; border-color: #2ecc71 !important; background: rgba(46, 204, 113, 0.05); }
        .active-review { color: #f39c12; border-color: #f39c12 !important; background: rgba(243, 156, 18, 0.05); }
        .active-deferred { color: #95a5a6; border-color: #95a5a6 !important; background: rgba(149, 165, 166, 0.05); }
        .stack { position: relative; width: 340px; height: 480px; z-index: 10; margin-top: 40px; }
        .card {
            position: absolute; width: 100%; height: 100%;
            background: var(--card-bg); border-radius: 32px;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            box-shadow: 0 30px 60px rgba(0,0,0,0.8);
            cursor: grab; transition: transform 0.1s ease, opacity 0.3s ease;
            user-select: none; touch-action: none; border: 1px solid #222; padding: 40px; box-sizing: border-box;
        }
        .word { font-size: 2.4rem; font-weight: 800; margin-bottom: 8px; text-align: center; letter-spacing: -1px; }
        .phonetic { font-family: 'Courier New', monospace; color: var(--accent); font-size: 1.1rem; margin-bottom: 35px; }
        .translation { font-size: 1.4rem; color: var(--text-dim); opacity: 0; transition: 0.3s; text-align: center; font-weight: 300; }
        .card.show-translation .translation { opacity: 1; color: #fff; }
        .audio-btn {
            background: #222; border: none; border-radius: 50%; width: 60px; height: 60px;
            cursor: pointer; display: flex; align-items: center; justify-content: center; margin-bottom: 25px;
            border: 1px solid #333;
        }
        .audio-btn svg { fill: var(--accent); width: 26px; }
        .status-info { position: fixed; bottom: 30px; font-size: 0.8rem; color: #333; font-weight: bold; letter-spacing: 2px; }
    </style>
</head>

    window.speechSynthesis.speak(ut);

        <div class="word">${data.w}</div>
        <div class="phonetic">${data.p}</div>
        <div class="translation">${data.t}</div>
    `;
    card.addEventListener('pointerdown', startDrag);
    stack.appendChild(card);
    document.getElementById('status').innerText = `袟袗袥袠楔袠袥袨小鞋: ${currentDeck.length}`;
}

function startDrag(e) {
    const card = e.currentTarget;
    let startX = e.clientX, startY = e.clientY, isDragging = false;
    const move = (me) => {
        let dx = me.clientX - startX, dy = me.clientY - startY;
        if (Math.abs(dx) > 5 || Math.abs(dy) > 5) isDragging = true;
        card.style.transform = `translate(${dx}px, ${dy}px) rotate(${dx / 25}deg)`;
        Object.values(zones).forEach(z => z.classList.remove('active-learned', 'active-review', 'active-deferred'));
        if (dx > 130) zones.R.classList.add('active-learned');
        else if (dx < -130) zones.L.classList.add('active-deferred');
        else if (dy < -130) zones.T.classList.add('active-review');
    };
    const up = (ue) => {
        let dx = ue.clientX - startX, dy = ue.clientY - startY;
        if (!isDragging) {
            card.classList.toggle('show-translation');
            card.style.transform = '';
        } else {
            if (dx > 160) finalize(card, 1200, dy, 'next');
            else if (dx < -160) finalize(card, -1200, dy, 'next');
            else if (dy < -160) finalize(card, dx, -1200, 'repeat');
            else card.style.transform = '';
        }
        Object.values(zones).forEach(z => z.classList.remove('active-learned', 'active-review', 'active-deferred'));
        document.removeEventListener('pointermove', move);
        document.removeEventListener('pointerup', up);
    };
    document.addEventListener('pointermove', move);
    document.addEventListener('pointerup', up);
}

function finalize(card, x, y, action) {
    card.style.transition = '0.5s cubic-bezier(0.23, 1, 0.32, 1)';
    card.style.transform = `translate(${x}px, ${y}px) rotate(${x/10}deg)`;
    card.style.opacity = '0';
    const word = currentDeck.shift();
    if (action === 'repeat') {
        currentDeck.splice(4, 0, word);
    }
    setTimeout(renderCard, 400);
}

setLevel('C1');
</script>
