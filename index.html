<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>English Mastery Swipe</title>
    <style>
        :root { 
            --bg: #0a0a0a; 
            --card-bg: #1a1a1a; 
            --accent: #64ffda; 
            --text-main: #e0e0e0; 
            --text-dim: #666;
            --dashed: #333;
        }
        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg); color: var(--text-main);
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            height: 100vh; margin: 0; overflow: hidden;
        }
        .level-selector {
            position: absolute; top: 30px; display: grid; 
            grid-template-columns: repeat(6, 1fr); gap: 8px; z-index: 100;
            background: #111; padding: 10px; border-radius: 12px; border: 1px solid #222;
        }
        .level-btn {
            background: #1a1a1a; border: 1px solid #333; color: var(--text-dim);
            padding: 8px 14px; border-radius: 8px; cursor: pointer; transition: 0.3s; 
            font-weight: 800; font-size: 0.8rem;
        }
        .level-btn.active { color: #000; background: var(--accent); border-color: var(--accent); }
        .drop-zone {
            position: absolute; display: flex; align-items: center; justify-content: center;
            font-weight: 900; font-size: 1.2rem; color: #444;
            text-transform: uppercase; pointer-events: none; transition: 0.3s; z-index: 1;
            letter-spacing: 4px;
        }
        .zone-top { 
            top: 0; left: 0; right: 0; height: 120px; 
            border-bottom: 2px dashed var(--dashed);
            align-items: flex-end; padding-bottom: 20px;
        }
        .zone-left { 
            left: 0; top: 0; bottom: 0; width: 120px; 
            writing-mode: vertical-rl; transform: rotate(180deg);
            border-left: 2px dashed var(--dashed);
            padding-left: 20px;
        }
        .zone-right { 
            right: 0; top: 0; bottom: 0; width: 120px; 
            writing-mode: vertical-rl;
            border-left: 2px dashed var(--dashed);
            padding-left: 20px;
        }
        .active-learned { color: #2ecc71; border-color: #2ecc71 !important; background: rgba(46, 204, 113, 0.05); }
        .active-review { color: #f39c12; border-color: #f39c12 !important; background: rgba(243, 156, 18, 0.05); }
        .active-deferred { color: #95a5a6; border-color: #95a5a6 !important; background: rgba(149, 165, 166, 0.05); }
        .stack { position: relative; width: 340px; height: 480px; z-index: 10; margin-top: 40px; }
        .card {
            position: absolute; width: 100%; height: 100%;
            background: var(--card-bg); border-radius: 32px;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            box-shadow: 0 30px 60px rgba(0,0,0,0.8);
            cursor: grab; transition: transform 0.1s ease, opacity 0.3s ease;
            user-select: none; touch-action: none; border: 1px solid #222; padding: 40px; box-sizing: border-box;
        }
        .word { font-size: 2.4rem; font-weight: 800; margin-bottom: 8px; text-align: center; letter-spacing: -1px; }
        .phonetic { font-family: 'Courier New', monospace; color: var(--accent); font-size: 1.1rem; margin-bottom: 35px; }
        .translation { font-size: 1.4rem; color: var(--text-dim); opacity: 0; transition: 0.3s; text-align: center; font-weight: 300; }
        .card.show-translation .translation { opacity: 1; color: #fff; }
        .audio-btn {
            background: #222; border: none; border-radius: 50%; width: 60px; height: 60px;
            cursor: pointer; display: flex; align-items: center; justify-content: center; margin-bottom: 25px;
            border: 1px solid #333;
        }
        .audio-btn svg { fill: var(--accent); width: 26px; }
        .status-info { position: fixed; bottom: 30px; font-size: 0.8rem; color: #333; font-weight: bold; letter-spacing: 2px; }
    </style>
</head>
<body>
    <div class="level-selector">
        <button class="level-btn" onclick="setLevel('A1')">A1</button>
        <button class="level-btn" onclick="setLevel('A2')">A2</button>
        <button class="level-btn" onclick="setLevel('B1')">B1</button>
        <button class="level-btn" onclick="setLevel('B2')">B2</button>
        <button class="level-btn active" onclick="setLevel('C1')">C1</button>
        <button class="level-btn" onclick="setLevel('C2')">C2</button>
    </div>
    <div class="drop-zone zone-left" id="zoneL">ВІДКЛАСТИ</div>
    <div class="drop-zone zone-top" id="zoneT">ПОВТОРИТИ</div>
    <div class="drop-zone zone-right" id="zoneR">ВИВЧЕНО</div>
    <div class="stack" id="stack"></div>
    <div class="status-info" id="status">ЗАВАНТАЖЕННЯ...</div>

<script>
// Настройки языка сессии (english — по умолчанию, german — на будущее)
let currentLang = "english"; 

// Глобальная переменная для хранения всей скачанной базы данных
let wordsDatabase = null;

let currentDeck = [];
const stack = document.getElementById('stack');
const zones = { 
    L: document.getElementById('zoneL'), 
    R: document.getElementById('zoneR'), 
    T: document.getElementById('zoneT') 
};

// Функция локального поиска слова в words.json вместо онлайн-запросов
async function fetchWordDetails(wordText) {
    const cleanWord = wordText.trim();
    let phonetic = "/.../", translation = "Переклад не знайдено";

    try {
        // Скачиваем файл с GitHub один раз за сессию
        if (!wordsDatabase) {
            const response = await fetch('./words.json');
            if (!response.ok) throw new Error();
            wordsDatabase = await response.json();
        }

        // Ищем массив слов для текущего языка и выбранного уровня (lvl)
        const levelWords = wordsDatabase[currentLang]?.[currentLevel] || [];
        
        // Находим нужное слово в массиве
        const found = levelWords.find(item => item.w.toLowerCase() === cleanWord.toLowerCase());
        
        if (found) {
            phonetic = found.p || "/.../";
            translation = found.t || "Переклад не знайдено";
        } else {
            translation = "Слово не знайдено в JSON";
        }
    } catch (e) {
        translation = "Помилка файлу words.json";
    }
    
    return { w: cleanWord, p: phonetic, t: translation };
}

// Глобальная переменная для отслеживания выбранного уровня кнопками
let currentLevel = 'C1'; 

async function setLevel(lvl) {
    currentLevel = lvl; // Обновляем текущий уровень
    document.querySelectorAll('.level-btn').forEach(b => b.classList.toggle('active', b.innerText === lvl));
    document.getElementById('status').innerText = `ЗАВАНТАЖЕННЯ...`;
    
    try {
        // Скачиваем базу, если её еще нет
        if (!wordsDatabase) {
            const response = await fetch('./words.json');
            if (!response.ok) throw new Error();
            wordsDatabase = await response.json();
        }
        
        // Берём слова из JSON. Если массив пустой, используем заглушку, чтобы приложение не падало
        const wordsList = wordsDatabase[currentLang]?.[lvl] || [];
        
        currentDeck = [];
        wordsList.forEach(item => {
            currentDeck.push({ w: item.w, p: item.p || '/.../', t: item.t, loaded: true });
        });
        
    } catch (e) {
        console.error("Не вдалося завантажити слова з JSON:", e);
        currentDeck = [{ w: "Error", p: "/.../", t: "Створіть words.json у репозиторії", loaded: true }];
    }
    
    await renderCard();
}

async function renderCard() {
    stack.innerHTML = "";

    if (!currentDeck || currentDeck.length === 0) {
        stack.innerHTML = "<div style='text-align:center; padding-top:150px;'><h3>РІВЕНЬ ПРОЙДЕНО!</h3></div>";
        document.getElementById('status').innerText = `ЗАЛИШИЛОСЬ: 0`;
        return;
    }

    document.getElementById('status').innerText = `ЗАЛИШИЛОСЬ: ${currentDeck.length}`;
    
    // Этот блок теперь отрабатывает мгновенно, так как все данные уже loaded: true
    if (!currentDeck[0].loaded) {
        stack.innerHTML = "<div style='text-align:center; padding-top:150px; color: var(--accent); font-weight:bold;'>ЗАВАНТАЖЕННЯ...</div>";
        const details = await fetchWordDetails(currentDeck[0].w);
        currentDeck[0] = { ...details, loaded: true };
        renderCard();
        return; 
    }

    const data = currentDeck[0];
    const card = document.createElement('div');
    card.className = 'card';
    card.style.touchAction = 'none'; 
    
    card.innerHTML = `
        <button class="audio-btn" onclick="event.stopPropagation(); speak('${data.w.replace(/'/g, "\\'")}')">
            <svg viewBox="0 0 24 24"><path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02z"/></svg>
        </button>
        <div class="word">${data.w}</div>
        <div class="phonetic">${data.p}</div>
        <div class="translation">${data.t}</div>
    `;
    
    card.addEventListener('pointerdown', startDrag);
    stack.appendChild(card);
}

// Обновленная функция озвучки с поддержкой будущих языков
function speak(text) {
    window.speechSynthesis.cancel();
    const ut = new SpeechSynthesisUtterance(text);
    ut.lang = (currentLang === "german") ? 'de-DE' : 'en-US';
    window.speechSynthesis.speak(ut);
}

function startDrag(e) {
    const card = e.currentTarget;
    let startX = e.clientX;
    let startY = e.clientY;
    let isDragging = false;

    const move = (me) => {
        let dx = me.clientX - startX;
        let dy = me.clientY - startY;

        if (Math.abs(dx) > 5 || Math.abs(dy) > 5) {
            isDragging = true;
        }

        card.style.transform = `translate(${dx}px, ${dy}px) rotate(${dx / 25}deg)`;

        Object.values(zones).forEach(z => z.classList.remove('active-learned', 'active-review', 'active-deferred'));

        if (dx > 130) {
            zones.R.classList.add('active-learned');
        } else if (dx < -130) {
            zones.L.classList.add('active-deferred');
        } else if (dy < -130) {
            zones.T.classList.add('active-review');
        }
    };

    const up = (ue) => {
        let dx = ue.clientX - startX;
        let dy = ue.clientY - startY;

        if (!isDragging) {
            card.classList.toggle('show-translation');
            card.style.transform = '';
        } else {
            if (dx > 160) {
                finalize(card, 1200, dy, 'next');
            } else if (dx < -160) {
                finalize(card, -1200, dy, 'next');
            } else if (dy < -160) {
                finalize(card, dx, -1200, 'repeat');
            } else {
                card.style.transform = '';
            }
        }

        Object.values(zones).forEach(z => z.classList.remove('active-learned', 'active-review', 'active-deferred'));
        document.removeEventListener('pointermove', move);
        document.removeEventListener('pointerup', up);
    };

    document.addEventListener('pointermove', move);
    document.addEventListener('pointerup', up);
}

function finalize(card, x, y, action) {
    card.style.transition = '0.5s cubic-bezier(0.23, 1, 0.32, 1)';
    card.style.transform = `translate(${x}px, ${y}px) rotate(${x / 10}deg)`;
    card.style.opacity = '0';

    const word = currentDeck.shift();

    if (action === 'repeat' && word) {
        currentDeck.splice(4, 0, word);
    }

    setTimeout(renderCard, 400);
}

// Запуск стартового уровня при первой загрузке страницы
setLevel('C1');
</script>
</body>
</html>
